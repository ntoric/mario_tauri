name: Build Tauri App

on:
  push:
    branches: [main, master]
    tags:
      - "v*"

  pull_request:
    branches: [main, master]

  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # - platform: macos-latest
          #   target: aarch64-apple-darwin
          #   artifact: mac-arm64
          # - platform: macos-13
          #   target: x86_64-apple-darwin
          #   artifact: mac-amd64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: windows
          # - platform: ubuntu-latest
          #   target: x86_64-unknown-linux-gnu
          #   artifact: linux

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.0-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build app
        run: cd frontend && npm run tauri build -- --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mario-juicy-${{ matrix.artifact }}
          path: frontend/src-tauri/target/${{ matrix.target }}/release/bundle/
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            mario-juicy-mac-arm64/**/*.dmg
            mario-juicy-mac-amd64/**/*.dmg
            mario-juicy-windows/**/*.exe
            mario-juicy-linux/**/*.AppImage
            mario-juicy-linux/**/*.deb
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}